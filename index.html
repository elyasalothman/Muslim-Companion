<!doctype html>
<html lang="ar" dir="rtl" data-scheme="brown">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#1a1410"/>
  <link rel="stylesheet" href="./assets/css/styles.css?v=0.6.4"/>
  <title>رفيق المسلم</title>
</head>
<body>
<header>
  <div class="header-wrap">
    <div class="brand">
      <span>رفيق المسلم</span>
      <img src="./assets/img/logo.svg" alt="" id="appLogo" style="width:30px; margin-right:8px;"/>
    </div>
  </div>
</header>

<main id="appBody" style="display:none;"> <div class="card">
    <div class="grid">
      <div class="kpi">
        <div class="label">التاريخ الهجري</div>
        <div class="value secondary" id="hijri">—</div>
      </div>
      <div class="kpi">
        <div class="label">الصلاة القادمة</div>
        <div class="value"><span id="nextPrayerName">—</span> (<span id="nextPrayerTime">—</span>)</div>
        <div id="nextCountdown" style="direction: ltr;">—</div>
      </div>
    </div>
  </div>

  <div class="card">
    <section id="times" class="section active">
      <div class="table-wrap">
        <table class="table">
          <tbody id="prayerTableBody">
            <tr><td>جاري تحميل الأوقات...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
    
    <section id="qibla" class="section">
      <div class="compass"><div class="dial"></div><div id="needle" class="needle"></div></div>
      <button class="btn" id="enableCompass" style="width:100%; margin-top:20px;">تفعيل البوصلة 🧭</button>
    </section>

    <section id="settings" class="section">
      <div class="version-tag">الإصدار 0.6.4</div>
      <button class="btn secondary" style="width:100%" onclick="localStorage.clear(); location.reload();">إعادة ضبط المصنع 🛠️</button>
    </section>
  </div>
</main>

<div id="loadingScreen" style="text-align:center; padding-top:100px; font-weight:bold;">
  جاري تشغيل رفيق المسلم...
</div>

<nav class="bottom-nav">
  <button class="active" data-target="times">🕌</button>
  <button data-target="qibla">🧭</button>
  <button data-target="settings">⚙️</button>
</nav>

<script src="./assets/js/app.js?v=0.6.4" type="module"></script>
</body>
</html>
