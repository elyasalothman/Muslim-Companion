<!doctype html>
<html lang="ar" dir="rtl" data-scheme="brown">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#1a1410"/>
  <link rel="stylesheet" href="./assets/css/styles.css?v=0.7.0"/>
  <title>رفيق المسلم</title>
</head>
<body>
<header>
  <div class="header-wrap">
    <div class="brand">
      <span>رفيق المسلم</span>
      <img src="./assets/img/logo.svg" alt="" id="appLogo" style="width:35px; margin-right:12px;"/>
    </div>
  </div>
</header>

<main id="appBody">
  <section id="times" class="section active">
    <div class="card" style="margin-bottom: 18px;">
      <div class="grid">
        <div class="kpi">
          <div class="label">التاريخ الهجري</div>
          <div class="value secondary" id="hijriDate">جاري التحميل...</div>
        </div>
        <div class="kpi">
          <div class="label">المدينة</div>
          <div class="value" id="cityName">الرياض</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th style="text-align: right;">الصلاة</th>
              <th style="text-align: left;">الوقت</th>
            </tr>
          </thead>
          <tbody>
            <tr><th>الفجر</th><td id="t_fajr" style="text-align: left;">—</td></tr>
            <tr><th>الظهر</th><td id="t_dhuhr" style="text-align: left;">—</td></tr>
            <tr><th>العصر</th><td id="t_asr" style="text-align: left;">—</td></tr>
            <tr><th>المغرب</th><td id="t_maghrib" style="text-align: left;">—</td></tr>
            <tr><th>العشاء</th><td id="t_isha" style="text-align: left;">—</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
  
  <section id="qibla" class="section">
    <div class="card">
      <p style="text-align: center; font-weight: 700; font-size: 1.4rem;">زاوية القبلة</p>
      <div class="compass" style="margin: 30px auto;"><div class="dial"></div><div id="needle" class="needle"></div></div>
      <button class="btn" id="enableCompass" style="width:100%; margin-top:20px;">تفعيل البوصلة 🧭</button>
      <div id="compassStatus" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
    </div>
  </section>

  <section id="tasbeeh" class="section">
    <div class="card tasbeeh-wrap">
      <div class="current-tasbeeh" id="currentTasbeeh" style="text-align:center; font-size:2rem; font-weight:bold; margin-bottom:20px; color:var(--accent);">سُبْحَانَ اللَّهِ</div>
      <div style="text-align:center; margin-bottom: 30px;">
        <div style="font-size:5rem; font-weight:900; font-family:Arial;" id="tasbeehCount">0</div>
      </div>
      <div style="display:flex; justify-content:center; gap:15px;">
        <button class="tasbeeh-btn" id="tasbeehBtn">سَبِّح</button>
      </div>
      <div style="text-align:center; margin-top:20px;">
        <button class="btn secondary" id="tasbeehReset">تصفير العداد</button>
      </div>
    </div>
  </section>

  <section id="settings" class="section">
    <div class="card">
      <h3 style="margin-top:0;">تحديث النظام</h3>
      <p style="color:var(--muted); font-size:0.9rem;">إذا واجهت أي مشكلة، اضغط على الزر أدناه لمسح الذاكرة المؤقتة وإعادة تحميل الموقع.</p>
      <button class="btn" style="width:100%; background:var(--danger); color:#fff;" id="hardResetBtn">إصلاح وتحديث إجباري 🔄</button>
      <div class="version-tag" style="text-align:center; margin-top:20px; color:var(--muted);">الإصدار المستقر 0.7.0</div>
    </div>
  </section>
</main>

<nav class="bottom-nav">
  <button class="active" data-target="times">🕌</button>
  <button data-target="qibla">🧭</button>
  <button data-target="tasbeeh">📿</button>
  <button data-target="settings">⚙️</button>
</nav>

<script src="./assets/js/app.js?v=0.7.0"></script>
</body>
</html>
