<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>رفيق المسلم</title>
  <meta name="theme-color" content="#1a5e3a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" sizes="192x192" href="/assets/icons/icon-192.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header>
    <div class="brand">🌙 <span>رفيق المسلم</span></div>
    <div class="toolbar">
      <button id="incFont" title="تكبير الخط">A+</button>
      <button id="decFont" title="تصغير الخط">A−</button>
      <button id="toggleTheme" title="الوضع الليلي/النهاري">☯</button>
    </div>
  </header>

  <section class="dashboard">
    <div class="info-card"><h3>التاريخ الهجري</h3><p id="hijri-date">—</p></div>
    <div class="info-card"><h3>الصلاة القادمة</h3><p id="next-prayer-time">—</p></div>
    <div class="info-card"><h3>إنجازك اليوم</h3><p><span id="daily-stats">0</span> ذكر</p></div>
  </section>

  <nav class="nav-container" id="navMenu">
    <button class="nav-btn active" data-target="athan">مواقيت الصلاة</button>
    <button class="nav-btn" data-target="rosary">المسبحة</button>
    <button class="nav-btn" data-target="morning">الصباح</button>
    <button class="nav-btn" data-target="evening">المساء</button>
    <button class="nav-btn" data-target="sleep">النوم</button>
    <button class="nav-btn" data-target="prayer">بعد الصلاة</button>
    <button class="nav-btn" data-target="qibla">اتجاه القبلة</button>
  </nav>

  <main>
    <section id="athan" class="section active">
      <h2 class="section-title">مواقيت الصلاة اليوم</h2>
      <div id="prayer-times-container"></div>
    </section>

    <section id="rosary" class="section">
      <h2 class="section-title">المسبحة الإلكترونية</h2>
      <div class="rosary-wrap">
        <div class="rosary-display" id="rosary-counter">0</div>
        <button class="rosary-btn" id="main-rosary-btn">اضغط للتسبيح</button>
        <div style="margin-top:14px">
          <select id="tasbeeh-type">
            <option value="سبحان الله">سبحان الله</option>
            <option value="الحمد لله">الحمد لله</option>
            <option value="لا إله إلا الله">لا إله إلا الله</option>
            <option value="الله أكبر">الله أكبر</option>
            <option value="أستغفر الله">أستغفر الله</option>
            <option value="الصلاة على النبي">اللهم صلِّ على محمد</option>
          </select>
          <button class="btn secondary" id="reset-rosary">تصفير</button>
        </div>
      </div>
    </section>

    <section id="morning" class="section" data-title="أذكار الصباح"></section>
    <section id="evening" class="section" data-title="أذكار المساء"></section>
    <section id="sleep" class="section" data-title="أذكار النوم"></section>
    <section id="prayer" class="section" data-title="أذكار دبر الصلوات"></section>

    <section id="qibla" class="section">
      <h2 class="section-title">اتجاه القبلة</h2>
      <div style="text-align:center">
        <div id="qibla-bearing" style="margin:8px 0">—</div>
        <div style="position:relative;width:260px;height:260px;margin:0 auto">
          <div id="compass" style="position:absolute;inset:0;border:8px solid var(--border);border-radius:50%"></div>
          <div id="needle" style="position:absolute;left:50%;top:50%;width:4px;height:110px;background:var(--secondary);transform-origin:50% 100%;transform:translate(-50%,-100%) rotate(0deg);"></div>
        </div>
        <div style="margin-top:12px"><button class="btn" id="enable-orientation">تفعيل البوصلة</button></div>
      </div>
    </section>
  </main>

  <script src="/js/app.js" type="module"></script>
</body>
</html>
