<!doctype html>
<html lang="ar" dir="rtl" data-scheme="brown">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <link rel="manifest" href="./manifest.webmanifest"/>
  <link rel="stylesheet" href="./assets/css/styles.css?v=3.0.0"/>
  <title>رفيق المسلم AR</title>
  <style>
    #ar-container { position: relative; width: 100%; height: 300px; border-radius: 15px; overflow: hidden; background: #000; display: none; }
    #ar-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
    #ar-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .ar-pointer { width: 40px; height: 40px; border: 4px solid var(--accent); border-bottom: none; border-left: none; transform: rotate(-45deg); transition: transform 0.1s; }
  </style>
</head>
<body>
<header>
  <div class="header-wrap"><div class="brand"><span>رفيق المسلم AR</span><img src="./assets/img/logo.svg" alt=""/></div></div>
</header>

<main>
  <div class="card">
    <div class="grid">
      <div class="kpi"><div class="label">الهجري</div><div class="value secondary" id="hijriDisplay">—</div></div>
      <div class="kpi"><div class="label">القادمة</div><div class="value"><span id="nextPrayerName">—</span></div><div id="nextCountdown" class="pulse-text">—</div></div>
      <div class="kpi"><div class="label">المدينة</div><div class="value" id="cityDisplay">الرياض</div></div>
    </div>
  </div>

  <div class="card">
    <section id="times" class="section active">
      <div class="table-wrap"><table class="table"><tbody id="prayerTableBody"></tbody></table></div>
    </section>

    <section id="qibla" class="section">
      <div id="ar-container">
        <video id="ar-video" autoplay playsinline></video>
        <div id="ar-overlay"><div class="ar-pointer" id="arPointer"></div></div>
      </div>
      <div class="compass" id="classicCompass"><div class="dial"></div><div id="needle" class="needle"></div></div>
      <div class="row" style="margin-top:20px"><button class="btn" id="toggleAR" style="width:100%">تفعيل القبلة بالكاميرا (AR) 📷</button></div>
      <p style="text-align: center;">الزاوية: <span id="qiblaDeg" style="color:var(--accent)">—</span></p>
    </section>

    <section id="adhkar" class="section"><div id="adhkarPills" class="pills"></div><div id="adhkarContainer"></div></section>
    
    <section id="tasbeeh" class="section">
      <div class="tasbeeh-wrap">
        <div class="tasbeeh-counter" id="tasbeehCount">0</div>
        <button class="tasbeeh-btn" id="mainTasbeehBtn">سَبِّح</button>
      </div>
    </section>

    <section id="learning" class="section"><div id="learnContent"></div></section>
  </div>
</main>

<nav class="bottom-nav">
  <button class="active" data-target="times">🕌</button>
  <button data-target="qibla">🧭</button>
  <button data-target="adhkar">🤲</button>
  <button data-target="tasbeeh">📿</button>
  <button data-target="learning">📚</button>
</nav>

<script src="./assets/js/app.js?v=3.0.0" type="module"></script>
</body>
</html>
